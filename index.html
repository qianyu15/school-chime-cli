<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学校チャイム登録 & 再生アプリ</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fc;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe3f0;
      --primary: #2563eb;
      --primary-2: #1d4ed8;
      --danger: #dc2626;
      --good: #059669;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eaf2ff 0%, var(--bg) 30%, #f8fafc 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: radial-gradient(circle at top left, #dbeafe 0%, #eff6ff 35%, #ffffff 100%);
      border: 1px solid #dbeafe;
      border-radius: 28px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .row {
      display: grid;
      gap: 12px;
      margin-bottom: 14px;
    }

    .two {
      grid-template-columns: 1fr 1fr;
    }

    @media (max-width: 700px) {
      .two { grid-template-columns: 1fr; }
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      font: inherit;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.6;
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.6;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease, background 0.2s ease;
    }

    button:active { transform: translateY(1px); }
    .primary { background: var(--primary); color: #fff; }
    .primary:hover { background: var(--primary-2); }
    .ghost { background: #eff6ff; color: #1d4ed8; }
    .danger { background: #fee2e2; color: var(--danger); }
    .good { background: #d1fae5; color: #047857; }

    .preset-list {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .preset {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      background: #fafcff;
    }

    .preset strong {
      display: block;
      margin-bottom: 3px;
    }

    .preset small {
      color: var(--muted);
    }

    .mini-btns {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      color: var(--muted);
      line-height: 1.6;
      min-height: 52px;
    }

    .footer-note {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    code {
      background: #eef2ff;
      padding: 2px 6px;
      border-radius: 8px;
      font-size: 0.95em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>学校チャイム登録 & 再生アプリ</h1>
      <p class="lead">
        Web Audio API でチャイムを作って、保存して、鳴らせます。人類はついにブラウザでベルを鳴らすところまで来ました。
      </p>
    </section>

    <div class="grid">
      <section class="card">
        <h2>チャイムを作る</h2>

        <div class="row two">
          <div>
            <label for="name">登録名</label>
            <input id="name" type="text" placeholder="例: 1時間目開始" value="始業チャイム" />
          </div>
          <div>
            <label for="volume">音量</label>
            <input id="volume" type="range" min="0" max="1" step="0.01" value="0.35" />
          </div>
        </div>

        <div class="row two">
          <div>
            <label for="waveform">音色</label>
            <select id="waveform">
              <option value="sine">sine</option>
              <option value="triangle" selected>triangle</option>
              <option value="square">square</option>
              <option value="sawtooth">sawtooth</option>
            </select>
          </div>
          <div>
            <label for="tempo">テンポ (BPM)</label>
            <input id="tempo" type="number" min="30" max="240" value="84" />
          </div>
        </div>

        <div class="row">
          <div>
            <label for="pattern">メロディー</label>
            <textarea id="pattern" spellcheck="false">C5:0.5, E5:0.5, G5:0.75, C6:1.0, rest:0.25, C6:0.5, G5:0.75, E5:0.5, C5:1.4</textarea>
            <div class="hint">
              書式: <code>音程:拍数</code> をカンマ区切り。<br />
              例: <code>C5:0.5</code>, <code>rest:0.25</code>, <code>A4:1</code>
            </div>
          </div>
        </div>

        <div class="controls">
          <button class="primary" id="playBtn">再生</button>
          <button class="ghost" id="stopBtn">停止</button>
          <button class="good" id="saveBtn">登録保存</button>
          <button class="danger" id="clearBtn">選択削除</button>
        </div>

        <div class="status" id="status">まだ何も鳴っていません。静かなのは、たぶん今だけです。</div>
        <div class="footer-note">保存したチャイムはブラウザの <code>localStorage</code> に入ります。</div>
      </section>

      <section class="card">
        <h2>登録済みチャイム</h2>
        <div class="row">
          <div>
            <label for="savedList">選択</label>
            <select id="savedList">
              <option value="">- 保存済みがありません -</option>
            </select>
          </div>
        </div>

        <div class="controls" style="margin-top: 0;">
          <button class="ghost" id="loadBtn">読み込み</button>
          <button class="primary" id="playSavedBtn">選択を再生</button>
        </div>

        <div class="preset-list" id="presetList"></div>
      </section>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "school-chime-presets-v1";

    const NOTE_FREQUENCIES = {
      C4: 261.63, "C#4": 277.18, Db4: 277.18, D4: 293.66, "D#4": 311.13, Eb4: 311.13,
      E4: 329.63, F4: 349.23, "F#4": 369.99, Gb4: 369.99, G4: 392.00, "G#4": 415.30,
      Ab4: 415.30, A4: 440.00, "A#4": 466.16, Bb4: 466.16, B4: 493.88,
      C5: 523.25, "C#5": 554.37, Db5: 554.37, D5: 587.33, "D#5": 622.25, Eb5: 622.25,
      E5: 659.25, F5: 698.46, "F#5": 739.99, Gb5: 739.99, G5: 783.99, "G#5": 830.61,
      Ab5: 830.61, A5: 880.00, "A#5": 932.33, Bb5: 932.33, B5: 987.77,
      C6: 1046.50, "C#6": 1108.73, Db6: 1108.73, D6: 1174.66, "D#6": 1244.51, Eb6: 1244.51,
      E6: 1318.51, F6: 1396.91, "F#6": 1479.98, Gb6: 1479.98, G6: 1567.98
    };

    const DEFAULT_PRESETS = [
      {
        id: crypto.randomUUID(),
        name: "始業チャイム",
        waveform: "triangle",
        volume: 0.35,
        tempo: 84,
        pattern: "C5:0.5, E5:0.5, G5:0.75, C6:1.0, rest:0.25, C6:0.5, G5:0.75, E5:0.5, C5:1.4"
      },
      {
        id: crypto.randomUUID(),
        name: "休み時間",
        waveform: "sine",
        volume: 0.3,
        tempo: 96,
        pattern: "G5:0.35, E5:0.35, C5:0.55, rest:0.2, C5:0.35, E5:0.35, G5:0.7"
      }
    ];

    let audioCtx = null;
    let stopFlag = false;
    let currentTimers = [];

    const el = {
      name: document.getElementById("name"),
      volume: document.getElementById("volume"),
      waveform: document.getElementById("waveform"),
      tempo: document.getElementById("tempo"),
      pattern: document.getElementById("pattern"),
      playBtn: document.getElementById("playBtn"),
      stopBtn: document.getElementById("stopBtn"),
      saveBtn: document.getElementById("saveBtn"),
      clearBtn: document.getElementById("clearBtn"),
      savedList: document.getElementById("savedList"),
      loadBtn: document.getElementById("loadBtn"),
      playSavedBtn: document.getElementById("playSavedBtn"),
      presetList: document.getElementById("presetList"),
      status: document.getElementById("status")
    };

    function setStatus(message) {
      el.status.textContent = message;
    }

    function getStoragePresets() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [...DEFAULT_PRESETS];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) && parsed.length ? parsed : [...DEFAULT_PRESETS];
      } catch {
        return [...DEFAULT_PRESETS];
      }
    }

    function saveStoragePresets(list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }

    function refreshUI() {
      const presets = getStoragePresets();

      el.savedList.innerHTML = presets.length
        ? presets.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join("")
        : `<option value="">- 保存済みがありません -</option>`;

      el.presetList.innerHTML = presets.map(p => `
        <div class="preset">
          <div>
            <strong>${escapeHtml(p.name)}</strong>
            <small>${escapeHtml(p.waveform)} / ${p.tempo} BPM / ${escapeHtml(p.pattern)}</small>
          </div>
          <div class="mini-btns">
            <button class="ghost" data-action="load" data-id="${p.id}">読む</button>
            <button class="primary" data-action="play" data-id="${p.id}">鳴らす</button>
          </div>
        </div>
      `).join("") || '<div class="hint">保存されたチャイムはまだありません。</div>';

      el.presetList.querySelectorAll("button[data-action]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.id;
          const action = btn.dataset.action;
          const preset = getStoragePresets().find(p => p.id === id);
          if (!preset) return;
          if (action === "load") loadPresetToForm(preset);
          if (action === "play") playPreset(preset);
        });
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function loadPresetToForm(preset) {
      el.name.value = preset.name;
      el.waveform.value = preset.waveform;
      el.volume.value = preset.volume;
      el.tempo.value = preset.tempo;
      el.pattern.value = preset.pattern;
      setStatus(`「${preset.name}」を読み込みました。次は鳴らすだけです。ブラウザが楽器になりました。`);
    }

    function parsePattern(patternText) {
      const parts = patternText.split(",").map(s => s.trim()).filter(Boolean);
      if (!parts.length) throw new Error("メロディーが空です。");

      return parts.map(part => {
        const [noteRaw, beatsRaw] = part.split(":").map(s => s.trim());
        if (!noteRaw || !beatsRaw) throw new Error(`書式エラー: 「${part}」`);
        const beats = Number(beatsRaw);
        if (!Number.isFinite(beats) || beats <= 0) throw new Error(`拍数が不正です: 「${part}」`);
        return { note: noteRaw, beats };
      });
    }

    function ensureAudioContext() {
      if (!audioCtx || audioCtx.state === "closed") {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function stopPlayback() {
      stopFlag = true;
      currentTimers.forEach(t => clearTimeout(t));
      currentTimers = [];
      if (audioCtx && audioCtx.state !== "closed") {
        // Current oscillators will stop naturally via timers; closing is overkill.
      }
      setStatus("停止しました。");
    }

    function scheduleTone(ctx, { note, beats }, startAt, tempo, waveform, volume) {
      const beatSeconds = 60 / tempo;
      const duration = beats * beatSeconds;
      const gap = Math.min(0.03, duration * 0.08);

      if (note.toLowerCase() === "rest") {
        return duration;
      }

      const freq = NOTE_FREQUENCIES[note];
      if (!freq) throw new Error(`未対応の音程です: ${note}`);

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();

      osc.type = waveform;
      osc.frequency.setValueAtTime(freq, startAt);

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(3600, startAt);
      filter.Q.setValueAtTime(0.8, startAt);

      gain.gain.setValueAtTime(0.0001, startAt);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume), startAt + 0.02);
      gain.gain.setValueAtTime(Math.max(0.0001, volume), startAt + duration - gap);
      gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);

      osc.start(startAt);
      osc.stop(startAt + duration + 0.03);

      return duration;
    }

    async function playPattern({ name, waveform, volume, tempo, pattern }) {
      try {
        stopFlag = false;
        const ctx = ensureAudioContext();
        await ctx.resume();

        const steps = parsePattern(pattern);
        let cursor = ctx.currentTime + 0.05;

        setStatus(`「${name}」を再生中です。学校の鐘は、なぜか人を急がせるのが仕事です。`);

        for (const step of steps) {
          if (stopFlag) return;
          const duration = scheduleTone(ctx, step, cursor, Number(tempo) || 84, waveform, Number(volume) || 0.35);
          cursor += duration;
        }

        const doneTimer = setTimeout(() => {
          if (!stopFlag) setStatus(`「${name}」の再生が終わりました。次の授業へどうぞ。`);
        }, Math.max(0, (cursor - ctx.currentTime) * 1000));
        currentTimers.push(doneTimer);
      } catch (err) {
        setStatus(`再生できません: ${err.message}`);
      }
    }

    function getFormPreset() {
      return {
        id: crypto.randomUUID(),
        name: el.name.value.trim() || "無題チャイム",
        waveform: el.waveform.value,
        volume: Number(el.volume.value),
        tempo: Number(el.tempo.value),
        pattern: el.pattern.value.trim()
      };
    }

    function playCurrentForm() {
      playPattern(getFormPreset());
    }

    function playPreset(preset) {
      playPattern(preset);
    }

    function saveCurrentPreset() {
      const preset = getFormPreset();
      if (!preset.pattern) {
        setStatus("保存できません。メロディーが空です。");
        return;
      }

      const presets = getStoragePresets();
      const existingIndex = presets.findIndex(p => p.name === preset.name);
      if (existingIndex >= 0) {
        presets[existingIndex] = { ...presets[existingIndex], ...preset, id: presets[existingIndex].id };
        setStatus(`「${preset.name}」を上書き保存しました。人類はすぐ既存データを更新します。`);
      } else {
        presets.unshift(preset);
        setStatus(`「${preset.name}」を保存しました。`);
      }

      saveStoragePresets(presets);
      refreshUI();
      el.savedList.value = preset.name ? (presets.find(p => p.name === preset.name)?.id || "") : "";
    }

    function deleteSelectedPreset() {
      const id = el.savedList.value;
      if (!id) {
        setStatus("削除するチャイムを選んでください。");
        return;
      }
      const presets = getStoragePresets().filter(p => p.id !== id);
      saveStoragePresets(presets.length ? presets : DEFAULT_PRESETS);
      refreshUI();
      setStatus("選択したチャイムを削除しました。");
    }

    function loadSelectedPreset() {
      const id = el.savedList.value;
      if (!id) {
        setStatus("読み込むチャイムを選んでください。");
        return;
      }
      const preset = getStoragePresets().find(p => p.id === id);
      if (!preset) return;
      loadPresetToForm(preset);
    }

    el.playBtn.addEventListener("click", playCurrentForm);
    el.stopBtn.addEventListener("click", stopPlayback);
    el.saveBtn.addEventListener("click", saveCurrentPreset);
    el.clearBtn.addEventListener("click", deleteSelectedPreset);
    el.loadBtn.addEventListener("click", loadSelectedPreset);
    el.playSavedBtn.addEventListener("click", () => {
      const id = el.savedList.value;
      if (!id) {
        setStatus("再生するチャイムを選んでください。");
        return;
      }
      const preset = getStoragePresets().find(p => p.id === id);
      if (preset) playPreset(preset);
    });

    window.addEventListener("beforeunload", stopPlayback);

    refreshUI();
    setStatus("完成です。まずは「再生」で試してください。音が出ないときは、ブラウザの自動再生制限が仕事をサボっているだけです。");
  </script>
</body>
</html>
